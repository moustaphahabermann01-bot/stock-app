<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Business Manager Pro - Style SUPECO</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        :root { --dark: #2c3e50; --green: #27ae60; --red: #e74c3c; --blue: #3498db; --gray: #95a5a6; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: var(--dark); }
        
        /* En-tête */
        .header { background: var(--dark); color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .config-fields input { padding: 8px; border-radius: 5px; border: none; margin-right: 5px; width: 150px; }

        /* Dashboard */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        
        /* Contenu Principal */
        .main-content { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f8f9fa; color: var(--gray); font-size: 12px; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .btn { border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; transition: 0.3s; }
        .btn-add { background: var(--blue); }
        .btn-pay { background: var(--green); width: 100%; font-size: 18px; padding: 15px; margin-top: 15px; }
        .btn-del { background: var(--red); padding: 5px 10px; }

        /* Design du Reçu (Type Pharmacie/Supermarché) */
        #ticket-print { display: none; width: 300px; padding: 20px; background: white; border: 1px dashed #333; font-family: 'Courier New', monospace; text-align: center; }
        #ticket-print table { font-size: 13px; margin: 15px 0; }
        @media print { body * { display: none !important; } #ticket-print, #ticket-print * { display: block !important; margin: auto; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0;">Business Manager Pro</h1>
            <div class="config-fields" style="margin-top:10px;">
                <input id="cfg-nom" placeholder="Nom Boutique" onchange="majBoutique()">
                <input id="cfg-tel" placeholder="Téléphone" onchange="majBoutique()">
            </div>
        </div>
        <select id="devise-globale" onchange="changerDevise(this.value)" style="padding:10px; border-radius:8px;">
            <option value="FCFA">FCFA (Sénégal)</option>
            <option value="€">EUR (€)</option>
            <option value="$">USD ($)</option>
        </
