<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion Pro - Version Investissement</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid #ddd; }
        .converter { background: #fff; padding: 10px; margin-bottom: 20px; border-radius: 8px; display: flex; gap: 10px; align-items: center; justify-content: center; }
        .main { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .section { background: white; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .benef-neg { color: var(--danger); }
        .benef-pos { color: var(--success); }
        #ticket-print { display: none; background: white; padding: 20px; width: 300px; text-align: center; border: 1px solid #000; }
    </style>
</head>
<body>

    <div class="converter">
        <strong>💱 Convertisseur Rapide :</strong>
        <input type="number" id="conv-montant" placeholder="Montant en FCFA" oninput="convertir()">
        <select id="target-devise" onchange="convertir()">
            <option value="655.95">EUR (€)</option>
            <option value="610">USD ($)</option>
            <option value="780">GBP (£)</option>
            <option value="85">CNY (¥)</option>
            <option value="165">AED (DH)</option>
        </select>
        <span id="conv-resultat" style="font-weight: bold; color: var(--success);">0.00</span>
    </div>

    <div class="dashboard">
        <div class="card"><h3>Investissement</h3><input type="number" id="set-invest" onchange="majInvest(this.value)" style="width:80%; text-align:center;"></div>
        <div class="card"><h3>Ventes (CA)</h3><p id="st-ca">0</p></div>
        <div class="card"><h3>Bénéfice Réel</h3><p id="st-benef">0</p></div>
        <div class="card"><h3>Stock Restant</h3><p id="st-stock">0</p></div>
    </div>

    <div class="main">
        <div class="section">
            <h2>📦 Inventaire (Prix Vente uniquement)</h2>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <input id="in-nom" placeholder="Nom du produit">
                <input id="in-vente" type="number" placeholder="Prix de Vente">
                <input id="in-qty" type="number" placeholder="Stock">
                <button onclick="ajouter()">Ajouter</button>
            </div>
            <table>
                <thead><tr><th>Produit</th><th>Prix</th><th>Stock</th><th>Action</th></tr></thead>
                <tbody id="corps"></tbody>
            </table>
        </div>

        <div class="section">
            <h2>🛒 Caisse</h2>
            <div id="panier"></div>
            <div style="font-size:24px; font-weight:bold; margin:15px 0;">Total: <span id="total-val">0</span> FCFA</div>
            <input type="number" id="pay-recu" placeholder="Espèces reçues" style="width:100%; padding:10px;">
            <button onclick="valider()" style="width:100%; padding:15px; background:var(--success); color:white; border:none; margin-top:10px; cursor:pointer;">ENCAISSER & QR CODE</button>
        </div>
    </div>

    <div id="ticket-print">
        <h3>TICKET DE CAISSE</h3>
        <p id="t-date"></p>
        <hr>
        <div id="t-items"></div>
        <hr>
        <h4 id="t-total"></h4>
        <canvas id="qrcode"></canvas>
        <p>Merci de votre visite !</p>
    </div>

<script>
    let produits = [], panier = [];
    const taux = { EUR: 655.95, USD: 610, GBP: 780, CNY: 85, AED: 165 };

    async function charger() {
        const stats = await (await fetch('/api/stats')).json();
        produits = await (await fetch('/api/produits')).json();
        
        document.getElementById('set-invest').value = stats.investissement;
        document.getElementById('st-ca').innerText = stats.caTotal.toLocaleString() + " FCFA";
        document.getElementById('st-stock').innerText = stats.valeurStock.toLocaleString() + " FCFA";
        
        const b = document.getElementById('st-benef');
        b.innerText = stats.beneficeReel.toLocaleString() + " FCFA";
        b.className = stats.beneficeReel >= 0 ? "benef-pos" : "benef-neg";

        afficher();
    }

    function convertir() {
        const m = document.getElementById('conv-montant').value;
        const t = document.getElementById('target-devise').value;
        document.getElementById('conv-resultat').innerText = (m / t).toFixed(2);
    }

    async function majInvest(montant) {
        await fetch('/api/investissement', { 
            method:'POST', 
            headers:{'Content-Type':'application/json'}, 
            body:JSON.stringify({montant: parseInt(montant)}) 
        });
        charger();
    }

    function afficher() {
        document.getElementById('corps').innerHTML = produits.map(p => `
            <tr><td>${p.nom}</td><td>${p.prix} FCFA</td><td>${p.stock}</td>
            <td><button onclick="addPanier('${p.nom}')">+</button></td></tr>
        `).join('');
    }

    function addPanier(nom) {
        const p = produits.find(x => x.nom === nom);
        const ex = panier.find(x => x.nom === nom);
        if(ex) ex.quantite++; else panier.push({...p, quantite: 1});
        majCaisse();
    }

    function majCaisse() {
        const total = panier.reduce((s, i) => s + (i.prix * i.quantite), 0);
        document.getElementById('total-val').innerText = total;
        document.getElementById('panier').innerHTML = panier.map(i => `<div>${i.nom} x${i.quantite}</div>`).join('');
    }

    async function valider() {
        const total = parseInt(document.getElementById('total-val').innerText);
        const encaisse = parseInt(document.getElementById('pay-recu').value);
        if(encaisse < total) return alert("Montant insuffisant");

        const res = await fetch('/api/vendre', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ panier, total, encaisse, monnaie: encaisse-total })
        });
        const data = await res.json();
        
        // Génération du QR Code sur le ticket
        document.getElementById('t-date').innerText = data.ticket.date;
        document.getElementById('t-total').innerText = "TOTAL: " + total + " FCFA";
        document.getElementById('t-items').innerHTML = panier.map(i => `<div>${i.nom} x${i.quantite}</div>`).join('');
        
        QRCode.toCanvas(document.getElementById('qrcode'), "VENTE-" + data.ticket.id, function (error) {
            window.print();
            location.reload();
        });
    }

    async function ajouter() {
        const p = {
            nom: document.getElementById('in-nom').value,
            prix: parseInt(document.getElementById('in-vente').value),
            stock: parseInt(document.getElementById('in-qty').value)
        };
        await fetch('/api/ajouter', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p)});
        location.reload();
    }

    charger();
</script>
</body>
</html>
